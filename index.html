<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyHub</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef2f7;
}

header{
background:#1e3a8a;
color:white;
padding:20px;
text-align:center;
}

nav{
background:#2563eb;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-size:18px;
}

.container{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
margin-bottom:10px;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

footer{
text-align:center;
padding:15px;
background:#1e3a8a;
color:white;
margin-top:20px;
}

</style>
</head>

<body>

<header>
<h1>StudyHub</h1>
<p>Notes | Quiz | Mock Test | Current Affairs</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Notes</a>
<a href="#">Quiz</a>
<a href="#">Mock Test</a>
<a href="#">Leaderboard</a>
</nav>

<div class="container">

<div class="card">
<h2>📚 Notes</h2>
<p>Subject wise study notes.</p>
<button>Open</button>
</div>

<div class="card">
<h2>🧠 Quiz</h2>
<p>Practice daily quiz questions.</p>
<button>Start Quiz</button>
</div>

<div class="card">
<h2>🧪 Mock Test</h2>
<p>Full exam mock test with timer.</p>
<button>Start Test</button>
</div>

<div class="card">
<h2>🏆 Leaderboard</h2>
<p>Top students ranking.</p>
<button>View</button>
</div>

</div>

<footer>
© 2026 StudyHub Education
</footer>

</body>
</html>
