<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduMock - Online Test Platform</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
    }
    header {
      background: #004aad;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      max-width: 800px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .question {
      font-size: 18px;
      margin-bottom: 10px;
    }
    .options label {
      display: block;
      margin: 8px 0;
      background: #eef3ff;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    button {
      background: #004aad;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 15px;
    }
    button:hover {
      background: #003580;
    }
    .result {
      font-size: 20px;
      font-weight: bold;
      margin-top: 20px;
      color: #004aad;
    }
  </style>
</head>
<body>
  <header>
    <h1>EduMock - Online Mock Test</h1>
  </header>

  <div class="container">
    <div id="quiz-container">
      <div id="question-container"></div>
      <div id="options-container" class="options"></div>
      <button id="next-btn">Next</button>
      <div id="result" class="result"></div>
    </div>
  </div>

  <script>
    const quizData = [
      {
        question: "What is the capital of India?",
        options: ["Mumbai", "New Delhi", "Kolkata", "Chennai"],
        answer: "New Delhi"
      },
      {
        question: "Which planet is known as the Red Planet?",
        options: ["Earth", "Mars", "Jupiter", "Venus"],
        answer: "Mars"
      },
      {
        question: "Who wrote the Indian National Anthem?",
        options: ["Rabindranath Tagore", "Mahatma Gandhi", "Subhash Chandra Bose", "Jawaharlal Nehru"],
        answer: "Rabindranath Tagore"
      }
    ];

    let currentQuestion = 0;
    let score = 0;

    const questionContainer = document.getElementById("question-container");
    const optionsContainer = document.getElementById("options-container");
    const nextBtn = document.getElementById("next-btn");
    const result = document.getElementById("result");

    function loadQuestion() {
      const q = quizData[currentQuestion];
      questionContainer.textContent = q.question;
      optionsContainer.innerHTML = "";
      q.options.forEach(option => {
        const label = document.createElement("label");
        label.innerHTML = `<input type="radio" name="option" value="${option}"> ${option}`;
        optionsContainer.appendChild(label);
      });
    }

    nextBtn.addEventListener("click", () => {
      const selected = document.querySelector('input[name="option"]:checked');
      if (!selected) return alert("Please select an answer!");
      if (selected.value === quizData[currentQuestion].answer) score++;
      currentQuestion++;
      if (currentQuestion < quizData.length) {
        loadQuestion();
      } else {
        questionContainer.style.display = "none";
        optionsContainer.style.display = "none";
        nextBtn.style.display = "none";
        result.textContent = `Your Score: ${score} / ${quizData.length}`;
      }
    });

    loadQuestion();
  </script>
</body>
</html>
